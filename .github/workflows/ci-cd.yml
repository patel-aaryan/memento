name: CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
  workflow_dispatch:
    

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/memento-server

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write serviceAccountKey.json
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > ./server/serviceAccountKey.json

      - name: Write .env file
        run: echo '${{ secrets.ENV_FILE }}' > ./server/.env

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to Render
        run: curl "${{ secrets.DEPLOY_HOOK_URL }}"
